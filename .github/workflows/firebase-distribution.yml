name: Flutter CI/CD - Firebase App Distribution

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Write .env
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
        run: |
          echo "API_BASE_URL=$API_BASE_URL" > mobile/.env

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      # The caching mechanism needs to know where pubspec.yaml lives
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true
          pubspec-file-path: mobile/pubspec.yaml

      # Use 'defaults.run.working-directory' if you prefer,
      # or explicitly run commands inside your subfolder using 'working-directory'
      - name: Install Dependencies
        working-directory: mobile
        run: flutter pub get

      - name: Run Code Analysis & Tests
        working-directory: mobile
        run: |
          flutter analyze
          flutter test

      - name: Decode Android Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > $RUNNER_TEMP/keystore.jks

      # build.gradle.kts reads signing config from this file, not from env
      # vars — Gradle never sees KEYSTORE_PASSWORD/KEY_ALIAS/KEY_PASSWORD
      # directly, only what's written here.
      - name: Write key.properties
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          {
            echo "storePassword=$KEYSTORE_PASSWORD"
            echo "keyPassword=$KEY_PASSWORD"
            echo "keyAlias=$KEY_ALIAS"
            echo "storeFile=$RUNNER_TEMP/keystore.jks"
          } > mobile/android/key.properties

      - name: Build Release APK
        working-directory: mobile
        run: flutter build apk --release

      # Note the updated path to the APK including your subfolder prefix
      - name: Upload to Firebase App Distribution
        uses: w9jds/firebase-action@v15.24.0
        with:
          args: appdistribution:distribute mobile/build/app/outputs/flutter-apk/app-release.apk --app ${{ secrets.FIREBASE_APP_ID }} --groups "baberia-testers"
        env:
          GCP_SA_KEY: ${{ secrets.CREDENTIAL_FILE_CONTENT }}
